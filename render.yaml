services:
  - type: web
    name: rag-fastapi-chatbot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CHROMA_PATH
        value: /var/data/chroma_db
      - key: FASTEMBED_CACHE
        value: /var/data/fastembed_cache
      - key: PYTHON_VERSION
        value: 3.11.9
    # Persistent disk so the Chroma DB and the cached embedding model
    # survive restarts (otherwise the 130 MB model re-downloads each time).
    disk:
      name: chroma-data
      mountPath: /var/data
      sizeGB: 1